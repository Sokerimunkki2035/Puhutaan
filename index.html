<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oma Tuki</title>

<style>
body{
font-family:Arial;
background:#f3f6f7;
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

#mic{
background:#e74c3c;
color:white;
height:70px;
font-size:18px;
}

#save{
background:#4a90e2;
color:white;
}

#download{
background:#7f8c8d;
color:white;
}

#status{
text-align:center;
color:#666;
margin:10px;
}

.bubble{
padding:10px 15px;
border-radius:15px;
margin:8px 0;
max-width:85%;
}

.user{
background:#dff1ff;
margin-left:auto;
}

.ai{
background:#eee;
}

#chat{
margin-top:15px;
max-height:350px;
overflow:auto;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2 style="text-align:center">Oma Tuki</h2>

<div id="setup">
<p>Syötä OpenRouter API-avain</p>
<input id="apikey" placeholder="sk-or-v1-...">
<button id="save">Tallenna</button>
</div>

<div id="app" style="display:none">

<div id="status">Paina nappia ja puhu</div>

<button id="mic">🎤 PUHU</button>

<div id="chat"></div>

<button id="download">💾 Lataa keskustelu</button>

</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("chat_history")) || []

const synth = window.speechSynthesis

const chat = document.getElementById("chat")
const status = document.getElementById("status")

function render(){
chat.innerHTML=""

history.forEach(m=>{
let div=document.createElement("div")
div.className="bubble "+(m.role==="user"?"user":"ai")
div.innerText=m.content
chat.appendChild(div)
})

chat.scrollTop=chat.scrollHeight
}

function saveHistory(){
localStorage.setItem("chat_history",JSON.stringify(history))
}

function speak(text){
let u=new SpeechSynthesisUtterance(text)
u.lang="fi-FI"
synth.speak(u)
}

async function askAI(text){

status.innerText="AI miettii..."

const key=localStorage.getItem("openrouter_key")

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key,
"HTTP-Referer":window.location.origin,
"X-Title":"Oma Tuki"
},

body:JSON.stringify({

model:"openai/gpt-4o-mini",

messages:[
{role:"system",content:"Olet empaattinen tukihenkilö. Vastaa lyhyesti suomeksi."},
...history
]

})

})

const data=await res.json()

const reply=data.choices[0].message.content

history.push({role:"assistant",content:reply})

saveHistory()

render()

speak(reply)

status.innerText="Valmis"

}catch(e){

status.innerText="API virhe"

console.log(e)

}

}

function listen(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

const rec=new SpeechRecognition()

rec.lang="fi-FI"

rec.start()

status.innerText="Kuunnellaan..."

rec.onresult=(e)=>{

const text=e.results[0][0].transcript

history.push({role:"user",content:text})

saveHistory()

render()

askAI(text)

}

rec.onerror=()=>{

status.innerText="Mikrofoni virhe"

}

}

document.getElementById("mic").onclick=listen

document.getElementById("save").onclick=()=>{

const k=document.getElementById("apikey").value.trim()

localStorage.setItem("openrouter_key",k)

location.reload()

}

document.getElementById("download").onclick=()=>{

let txt=history.map(m=>(m.role==="user"?"MINÄ: ":"AI: ")+m.content).join("\n\n")

let blob=new Blob([txt])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="keskustelu.txt"

a.click()

}

if(localStorage.getItem("openrouter_key")){

document.getElementById("setup").style.display="none"

document.getElementById("app").style.display="block"

render()

}

</script>

</body>
</html>
