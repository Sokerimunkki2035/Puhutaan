<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oma Tuki - AI-kumppani</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: var(--bg-color); color: var(--text-color); }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; width: auto; color: #7f8c8d; }

        input, button { padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #bdc3c7; }

        #startBtn { background-color: var(--accent-color); font-size: 18px; height: 60px; display: none; }
        
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #status { text-align: center; font-size: 14px; color: #7f8c8d; min-height: 20px; margin: 10px 0; }
        
        #conversation { margin-top: 20px; max-height: 50vh; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 15px; line-height: 1.5; max-width: 85%; }
        .user-msg { background-color: #e1f0ff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 2px; font-weight: 500; }

        .hidden { display: none !important; }
        .secondary-btn { background-color: #7f8c8d; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">Oma Tuki</h2>
            <button class="settings-btn" id="toggleSettings">⚙️</button>
        </div>
        
        <div id="setupSection">
            <p style="font-size: 14px; color: #666;">Syötä API-avain aloittaaksesi. Avain tallentuu vain omaan selaimeesi.</p>
            <input type="password" id="apiKeyInput" placeholder="Openrouter API-avain">
            <button id="saveKeyBtn">Tallenna ja jatka</button>
        </div>

        <div id="mainSection" class="hidden">
            <p id="status">Paina nappia ja ala puhua</p>
            <button id="startBtn">🎤 Puhu nyt</button>
            <div id="conversation"></div>
            
            <button id="downloadBtn" class="secondary-btn">💾 Tallenna terapiaa varten (.txt)</button>
            <button id="clearBtn" class="secondary-btn" style="background-color: #95a5a6;">🗑️ Tyhjennä historia</button>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const startBtn = document.getElementById('startBtn');
        const statusPara = document.getElementById('status');
        const conversationDiv = document.getElementById('conversation');
        const setupSection = document.getElementById('setupSection');
        const mainSection = document.getElementById('mainSection');
        const toggleSettings = document.getElementById('toggleSettings');

        let chatHistory = JSON.parse(localStorage.getItem('therapyChatHistory')) || [];

        // Tarkistus käynnistyksessä
        if (localStorage.getItem('openrouterApiKey')) {
            showMain();
            renderHistory();
        }

        function showMain() {
            setupSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            startBtn.style.display = 'block';
        }

        toggleSettings.onclick = () => {
            setupSection.classList.toggle('hidden');
            mainSection.classList.toggle('hidden');
        };

        saveKeyBtn.onclick = () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('openrouterApiKey', key);
                showMain();
            }
        };

        function renderHistory() {
            conversationDiv.innerHTML = chatHistory.map(msg => 
                `<div class="msg ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}">
                    ${msg.content}
                </div>`
            ).join('');
            conversationDiv.scrollTop = conversationDiv.scrollHeight;
        }

        // PUHEENTUNNISTUS
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fi-FI';
        recognition.continuous = false;
        recognition.interimResults = false;

        const synth = window.speechSynthesis;

        startBtn.onclick = () => {
            try {
                recognition.start();
                startBtn.classList.add('pulse');
                statusPara.innerText = "Kuunnellaan... Puhu nyt.";
                startBtn.disabled = true;
            } catch (e) {
                console.error("Recognition jo päällä", e);
            }
        };

        recognition.onresult = async (event) => {
            const userInput = event.results[0][0].transcript;
            startBtn.classList.remove('pulse');
            statusPara.innerText = "Tekoäly miettii...";
            
            chatHistory.push({ role: "user", content: userInput });
            renderHistory();

            const apiKey = localStorage.getItem('openrouterApiKey');

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "google/gemini-flash-1.5", // Päivitetty nopeampaan malliin
                        messages: [
                            { role: "system", content: "Olet empaattinen tukihenkilö pahoja hetkiä varten. Vastaa suomeksi, ole lohduttava ja tiivis." },
                            ...chatHistory
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                chatHistory.push({ role: "assistant", content: aiResponse });
                localStorage.setItem('therapyChatHistory', JSON.stringify(chatHistory));
                renderHistory();

                const utterance = new SpeechSynthesisUtterance(aiResponse);
                utterance.lang = 'fi-FI';
                utterance.onend = () => {
                    statusPara.innerText = "Valmis. Paina mikrofonia uudelleen.";
                    startBtn.disabled = false;
                };
                synth.speak(utterance);

            } catch (error) {
                statusPara.innerText = "Virhe yhteysessä. Tarkista API-avain.";
                startBtn.disabled = false;
                startBtn.classList.remove('pulse');
            }
        };

        recognition.onerror = () => {
            statusPara.innerText = "Ei saatu selvää. Yritä uudelleen.";
            startBtn.disabled = false;
            startBtn.classList.remove('pulse');
        };

        document.getElementById('downloadBtn').onclick = () => {
            const textContent = chatHistory.map(m => `${m.role === 'user' ? 'MINÄ' : 'TUKI'}: ${m.content}`).join('\n\n');
            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `terapiapaivakirja_${new Date().toLocaleDateString()}.txt`;
            a.click();
        };

        document.getElementById('clearBtn').onclick = () => {
            if(confirm("Tyhjennetäänkö keskusteluhistoria?")) {
                chatHistory = [];
                localStorage.removeItem('therapyChatHistory');
                renderHistory();
            }
        };
    </script>
</body>
</html>
