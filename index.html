<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oma Tuki v2</title>
    <style>
        :root { --p: #4a90e2; --a: #e74c3c; --bg: #f4f7f6; --gray: #95a5a6; }
        body { font-family: sans-serif; max-width: 500px; margin: 0 auto; padding: 15px; background: var(--bg); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        button { padding: 15px; margin: 5px 0; border-radius: 10px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { opacity: 0.5; }
        .main-btn { background: var(--a); color: white; height: 70px; }
        .sec-btn { background: var(--gray); color: white; }
        .clear-btn { background: #eee; color: #666; font-size: 12px; margin-top: 20px; }
        .settings-link { color: var(--p); text-align: center; display: block; margin-top: 15px; text-decoration: none; font-size: 14px; }

        #status { text-align: center; color: #666; font-style: italic; margin: 10px 0; min-height: 1.2em; }
        #log { margin-top: 20px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; border-top: 1px solid #eee; padding-top: 10px; }
        
        .bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .u { background: #e1f0ff; align-self: flex-end; }
        .b { background: #eee; align-self: flex-start; }
        
        .pulse { animation: p-anim 1.5s infinite; }
        @keyframes p-anim { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; text-align:center;">Oma Tuki</h2>

    <div id="setup" class="hidden">
        <p style="font-size:14px;">Syötä OpenRouter API-avain:</p>
        <input type="password" id="keyIn" placeholder="sk-or-v1-..." style="width:100%; padding:12px; box-sizing:border-box; border-radius:5px; border:1px solid #ccc;">
        <button onclick="saveKey()" style="background:var(--p); color:white; margin-top:10px;">Tallenna ja aloita</button>
    </div>

    <div id="main">
        <div id="status">Paina nappia ja puhu</div>
        <button id="micBtn" class="main-btn">🎤 PUHU NYT</button>
        <div id="log"></div>
        
        <button onclick="downloadLog()" class="sec-btn">💾 Lataa keskustelu (.txt)</button>
        <button onclick="clearHistory()" class="clear-btn">🗑️ Tyhjennä keskusteluhistoria</button>
        <a href="#" class="settings-link" onclick="showSetup()">⚙️ Muuta API-avainta</a>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    
    let history = JSON.parse(localStorage.getItem('therapy_history')) || [];
    const synth = window.speechSynthesis;
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRes = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRes();
        recognition.lang = 'fi-FI';
    } else {
        alert("Selaimesi ei tue puheentunnistusta.");
    }

    if (!localStorage.getItem('openrouter_key')) {
        showSetup();
    } else {
        renderHistory();
    }

    function showSetup() {
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('main').classList.add('hidden');
    }

    function saveKey() {
        const val = document.getElementById('keyIn').value.trim();
        if (val) {
            localStorage.setItem('openrouter_key', val);
            location.reload();
        }
    }

    function clearHistory() {
        if(confirm("Haluatko varmasti poistaa kaikki viestit?")) {
            localStorage.removeItem('therapy_history');
            history = [];
            renderHistory();
            status.innerText = "Historia tyhjennetty.";
        }
    }

    function renderHistory() {
        log.innerHTML = history.map(m => `<div class="bubble ${m.role === 'user' ? 'u' : 'b'}">${m.content}</div>`).join('');
        log.scrollTop = log.scrollHeight;
    }

    micBtn.onclick = () => {
        const wakeUp = new SpeechSynthesisUtterance("");
        synth.speak(wakeUp);
        try {
            recognition.start();
            status.innerText = "Kuunnellaan...";
            micBtn.classList.add('pulse');
            micBtn.disabled = true;
        } catch (e) {
            status.innerText = "Virhe käynnistyksessä.";
            micBtn.disabled = false;
        }
    };

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        micBtn.classList.remove('pulse');
        status.innerText = "Tekoäly miettii...";
        
        history.push({ role: "user", content: text });
        renderHistory();

        const key = localStorage.getItem('openrouter_key');

        try {
            const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key.trim()}`,
                    'HTTP-Referer': window.location.origin,
                    'X-Title': 'Oma Tuki'
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-001", 
                    messages: [
                        { role: "system", content: "Olet empaattinen tukihenkilö. Vastaa suomeksi lyhyesti ja lohduttavasti." },
                        ...history
                    ]
                })
            });

            const data = await resp.json();
            
            if (!resp.ok) {
                throw new Error(data.error?.message || "Palvelinvirhe");
            }
            
            const aiText = data.choices[0].message.content;
            history.push({ role: "assistant", content: aiText });
            localStorage.setItem('therapy_history', JSON.stringify(history));
            renderHistory();

            const speak = new SpeechSynthesisUtterance(aiText);
            speak.lang = 'fi-FI';
            speak.onend = () => {
                status.innerText = "Valmis.";
                micBtn.disabled = false;
            };
            synth.speak(speak);

        } catch (err) {
            status.innerText = "Virhe: " + err.message;
            micBtn.disabled = false;
        }
    };

    recognition.onerror = () => {
        micBtn.disabled = false;
        micBtn.classList.remove('pulse');
        status.innerText = "Mikrofoni-virhe.";
    };

    function downloadLog() {
        const data = history.map(m => `${m.role === 'user' ? 'MINÄ' : 'AI'}: ${m.content}`).join('\n\n');
        const blob = new Blob([data], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'keskustelu.txt';
        a.click();
    }
</script>
</body>
</html>
