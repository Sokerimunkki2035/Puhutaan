<!DOCTYPE html>
<html>
<head>
    <title>Openrouter.ai API-avain</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        input, button { padding: 8px; margin: 5px 0; }
        #conversation { margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 100px; }
    </style>
</head>
<body>
    <h2>Syötä Openrouter.ai API-avain</h2>
    <input type="password" id="apiKeyInput" placeholder="Syötä API-avain" />
    <button id="saveKeyBtn">Tallenna avain</button>

    <button id="startBtn" disabled>Aloita kuuntelu</button>
    <div id="conversation"></div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const startBtn = document.getElementById('startBtn');
        const conversationDiv = document.getElementById('conversation');

        // Tallenna API-avain localStorageen
        saveKeyBtn.addEventListener('click', () => {
            const apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('openrouterApiKey', apiKey);
                alert('API-avain tallennettu!');
                startBtn.disabled = false;
            } else {
                alert('Syötä API-avain!');
            }
        });

        // Puheentunnistus
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fi-FI';

        // Puhesyntetisaattori
        const synth = window.speechSynthesis;

        startBtn.addEventListener('click', () => {
            recognition.start();
        });

        recognition.onresult = async (event) => {
            const userInput = event.results[0][0].transcript;
            conversationDiv.innerHTML += `<p><strong>Sinä:</strong> ${userInput}</p>`;

            // Haetaan tallennettu API-avain
            const apiKey = localStorage.getItem('openrouterApiKey');
            if (!apiKey) {
                conversationDiv.innerHTML += `<p><strong>Virhe:</strong> API-avainta ei ole tallennettu.</p>`;
                return;
            }

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "mistralai/mistral-7b-instruct",
                        messages: [{ role: "user", content: userInput }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API-virhe: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                conversationDiv.innerHTML += `<p><strong>Tekoäly:</strong> ${aiResponse}</p>`;

                // Lue vastaus ääneen
                const utterance = new SpeechSynthesisUtterance(aiResponse);
                utterance.lang = 'fi-FI';
                synth.speak(utterance);
            } catch (error) {
                console.error("Virhe:", error);
                conversationDiv.innerHTML += `<p><strong>Virhe:</strong> ${error.message}</p>`;
            }
        };
    </script>
</body>
</html>
