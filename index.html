<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuki-AI & Muisti</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        button { background-color: #4a90e2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        .secondary-btn { background-color: #7f8c8d; margin-top: 10px; }
        #status { color: #666; font-style: italic; margin-bottom: 10px; text-align: center; }
        #conversation { margin-top: 20px; max-height: 400px; overflow-y: auto; border-top: 2px solid #eee; padding-top: 10px; }
        .user-msg { color: #2c3e50; margin-bottom: 10px; padding: 5px; border-left: 3px solid #4a90e2; }
        .ai-msg { color: #27ae60; margin-bottom: 15px; font-weight: bold; padding: 5px; border-left: 3px solid #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Oma Tuki</h2>
        
        <div id="setupSection">
            <input type="password" id="apiKeyInput" placeholder="Syötä Openrouter API-avain">
            <button id="saveKeyBtn">Tallenna ja aloita</button>
        </div>

        <p id="status">Valmis auttamaan.</p>
        <button id="startBtn" style="display:none; background-color: #e74c3c;">Puhu nyt</button>
        
        <div id="conversation"></div>

        <button id="downloadBtn" class="secondary-btn">Lataa keskustelu (.txt)</button>
        <button id="clearBtn" class="secondary-btn" style="background-color: #c0392b;">Tyhjennä historia</button>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const startBtn = document.getElementById('startBtn');
        const statusPara = document.getElementById('status');
        const conversationDiv = document.getElementById('conversation');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Ladataan aiempi historia muistista heti alussa
        let chatHistory = JSON.parse(localStorage.getItem('therapyChatHistory')) || [];
        renderHistory();

        if (localStorage.getItem('openrouterApiKey')) {
            document.getElementById('setupSection').style.display = 'none';
            startBtn.style.display = 'block';
        }

        function renderHistory() {
            conversationDiv.innerHTML = chatHistory.map(msg => 
                `<div class="${msg.role === 'user' ? 'user-msg' : 'ai-msg'}">
                    <strong>${msg.role === 'user' ? 'Sinä' : 'Tuki'}:</strong> ${msg.content}
                </div>`
            ).join('');
            conversationDiv.scrollTop = conversationDiv.scrollHeight;
        }

        saveKeyBtn.addEventListener('click', () => {
            const apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                localStorage.setItem('openrouterApiKey', apiKey);
                document.getElementById('setupSection').style.display = 'none';
                startBtn.style.display = 'block';
            }
        });

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fi-FI';
        const synth = window.speechSynthesis;

        startBtn.addEventListener('click', () => {
            recognition.start();
            statusPara.innerText = "Kuunnellaan...";
            startBtn.disabled = true;
        });

        recognition.onresult = async (event) => {
            const userInput = event.results[0][0].transcript;
            statusPara.innerText = "Käsitellään...";
            
            chatHistory.push({ role: "user", content: userInput });
            renderHistory();

            const apiKey = localStorage.getItem('openrouterApiKey');

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "mistralai/mistral-7b-instruct",
                        messages: [
                            { role: "system", content: "Olet empaattinen tukihenkilö. Vastaa suomeksi, lyhyesti ja lohduttavasti." },
                            ...chatHistory // Lähetetään historia tekoälylle, jotta se muistaa mitä on puhuttu
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                chatHistory.push({ role: "assistant", content: aiResponse });
                localStorage.setItem('therapyChatHistory', JSON.stringify(chatHistory));
                renderHistory();

                const utterance = new SpeechSynthesisUtterance(aiResponse);
                utterance.lang = 'fi-FI';
                utterance.onend = () => {
                    statusPara.innerText = "Valmis kuuntelemaan.";
                    startBtn.disabled = false;
                };
                synth.speak(utterance);

            } catch (error) {
                statusPara.innerText = "Virhe tapahtui.";
                startBtn.disabled = false;
            }
        };

        // Keskustelun lataaminen tiedostona
        downloadBtn.addEventListener('click', () => {
            const textContent = chatHistory.map(m => `${m.role === 'user' ? 'MINÄ' : 'AI'}: ${m.content}`).join('\n\n');
            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `keskustelu_${new Date().toLocaleDateString()}.txt`;
            a.click();
        });

        // Historian tyhjennys
        clearBtn.addEventListener('click', () => {
            if(confirm("Haluatko varmasti poistaa koko historian?")) {
                chatHistory = [];
                localStorage.removeItem('therapyChatHistory');
                renderHistory();
            }
        });
    </script>
</body>
</html>
