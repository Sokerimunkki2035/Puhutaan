<script>
    // ... (alku pysyy samana) ...

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        micBtn.classList.remove('pulse');
        status.innerText = "Tekoäly miettii...";
        
        history.push({ role: "user", content: text });
        renderHistory();

        const key = localStorage.getItem('openrouter_key');

        try {
            const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key.trim()}`, // Lisätty trim varmuuden vuoksi
                    'HTTP-Referer': window.location.href,    // OpenRouter vaatii tämän
                    'X-Title': 'Oma Tuki Sovellus'           // OpenRouter vaatii tämän
                },
                body: JSON.stringify({
                    model: "google/gemini-flash-1.5-8b",     // Päivitetty mallin nimi
                    messages: [
                        { role: "system", content: "Olet empaattinen tukihenkilö. Vastaa suomeksi lyhyesti ja lohduttavasti." },
                        ...history
                    ]
                })
            });

            if (!resp.ok) {
                const errorData = await resp.json();
                throw new Error(errorData.error?.message || "Yhteysvirhe");
            }

            const data = await resp.json();
            const aiText = data.choices[0].message.content;
            
            history.push({ role: "assistant", content: aiText });
            localStorage.setItem('therapy_history', JSON.stringify(history));
            renderHistory();

            const speak = new SpeechSynthesisUtterance(aiText);
            speak.lang = 'fi-FI';
            speak.onend = () => {
                status.innerText = "Valmis. Puhu uudelleen?";
                micBtn.disabled = false;
            };
            synth.speak(speak);

        } catch (err) {
            console.error(err);
            status.innerText = "Virhe: " + err.message;
            micBtn.disabled = false;
        }
    };
    
    // ... (loput pysyy samana) ...
</script>
